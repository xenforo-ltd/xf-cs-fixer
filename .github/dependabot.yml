version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"

    groups:
      composer:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"

    groups:
      github-actions:
        patterns:
          - "*"
