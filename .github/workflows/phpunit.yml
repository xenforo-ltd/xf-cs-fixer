name: PHPUnit

on:
  workflow_dispatch:

  push:
    branches:
      - "main"
    paths:
      - "**.php"
      - phpunit.xml.dist

  pull_request:
    branches:
      - "main"
    paths:
      - "**.php"
      - phpunit.xml.dist

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    container: ghcr.io/xenforo-ltd/php-ci:8.5

    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get cache data
        id: cache-data
        run: |
          echo "composer_path=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Set up Composer cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.cache-data.outputs.composer_path }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install

      - name: Set up PHPUnit cache
        uses: actions/cache@v5
        with:
          path: .phpunit.result.cache
          key: phpunit-${{ steps.cache-data.outputs.date }}
          restore-keys: |
            phpunit-${{ steps.cache-data.outputs.date }}
            phpunit-

      - name: PHPUnit
        run: composer phpunit
