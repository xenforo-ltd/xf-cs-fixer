name: PHPUnit

on:
  workflow_dispatch:

  push:
    branches:
      - "main"
    paths:
      - "**.php"
      - phpunit.xml.dist

  pull_request:
    branches:
      - "main"
    paths:
      - "**.php"
      - phpunit.xml.dist

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    container: ghcr.io/xenforo-ltd/php-ci:8.5
    permissions:
      contents: read
      packages: read # required for php-ci container

    steps:
      - name: Install git
        run: apk add --no-cache git

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get cache data
        id: cache-data
        run: |
          echo "composer_path=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Set up Composer cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.cache-data.outputs.composer_path }}
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install

      - name: Set up PHPUnit cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .phpunit.result.cache
          key: phpunit-${{ steps.cache-data.outputs.date }}
          restore-keys: |
            phpunit-${{ steps.cache-data.outputs.date }}
            phpunit-

      - name: PHPUnit
        run: composer phpunit
